<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR Dino Hatch Game</title>
    
    <link rel="stylesheet" href="styles/main.css">

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ar-overlay">
        <div id="scanning-container" class="ui-screen hidden">
            <div class="instruction-box">
                <div class="spinner"></div>
                <span id="instructions">Move phone to scan the floor...</span>
            </div>
            
            <div class="scanner-visual">
                <div class="scanner-laser"></div>
                <div class="phone-icon-animation">📱👋</div>
            </div>
        </div>

        <div id="gameplay-container" class="ui-screen hidden">
            <div id="gameplay-hud-container" class="level-hud-container hidden">
                <div class="level-badge">LV <span id="hud-level-text">1</span></div>
                <div class="xp-track-background">
                    <div id="hud-xp-filler" class="xp-track-filler" style="width: 35%;"></div>
                </div>
            </div>
            <div id="game-instruction-box" class="instruction-box">
                <span id="game-instructions">Drag egg to move. Double-tap to hatch!</span>
            </div>
        </div>

        <div id="system-overlay-container" class="hidden">
            <button id="credits-trigger-btn" class="ui-circular-btn">ℹ️</button>
        </div>

        <div id="credits-modal-popup" class="modal-blur-screen hidden">
            <div class="modal-card">
                <h3>Dino Park AR</h3>
                <p class="modal-sub">v0.2.0 Development Build</p>
                <hr class="modal-divider"/>
                <p><strong>Lead Architect:</strong> Henri Wijaya</p>
                <p><strong>Engine Framework:</strong> WebXR & Three.js</p>
                <button id="credits-close-btn" class="modal-action-btn">Close Matrix</button>
            </div>
        </div>
    </div>

    <script type="module" src="scripts/main.js"></script>

</body>
</html>
